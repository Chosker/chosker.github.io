### Site Settings ###
title               : Tech Art Fragments
description         : >-
                      Hi! this blog is dedicated to Tech Art tips and insights (<i>knowledge fragments</i>), focused on short, quick and useful snippets and obscure or lesser-known functionalities.
baseurl             : ""            # Change to empty quotes if you are hosting your site at <your-username>.github.io directly
repository          : chosker/chosker.github.io      # Change to <your-username>/<your-username>.github.io (or remove it if you don't need remote projects)
remote_theme        : yousinix/portfolYOU
open_new_tab        : false                    # Opens external URLs in new tab (works for posts, projects and navbar only)


### Plugins ###
plugins:
  - jemoji


### Navbar Settings ###
nav_exclude:                                            # The following paths are excluded from navbar
  - pages/tags.html
  - pages/404.html
  - pages/index.md
  - pages/projects.html
nav_settings:
  image             : https://chosker.github.io/title.png

### Author Info ###
author:
  name              : Chosker
  image             : https://chosker.github.io/logo.png
#  behance           : your_username
# dribbble          : your_username
#  email             : username@domain.com
#  facebook          : your_username
# gitlab            : your_username
