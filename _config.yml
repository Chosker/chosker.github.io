# keybase           : your_username
  bluesky           : chosker.bsky.social
  linkedin          : oscarsanz
  artstation        : chosker
  github            : chosker


### Posts ###
permalink: /blog/:title
blog_settings:
  title: Fragments
  content: <i>Quick tips and insights focused on useful snippets and obscure or lesser-known functionalities.</i>

### Collections ###
collections:
  projects:
    output: false
    permalink: /projects/:name


### Disqus ###
disqus:
  shortname: your-short-name-disqus                     # Your website Shortname on disqus


### Analytics ###
analytics:
  enabled: false                                        # Set true to enable analytics
  google:
    tracking_id: your-google-tracking-id


### Buy me a coffee ###
# See https://www.buymeacoffee.com/
buymeacoffee:
  enabled: false
  username: your_username
  color: "#007bff"
  message: "Thank you for visiting."                    # Message to be displayed aside from the button for a few seconds.
  description: "Support me on Buy me a coffee!"


### Defaults for collections ###
defaults:
#  - scope:
#      path: ""
#      type: "projects"
#    values:
#      layout: "page"
  - scope:
      path: ""
      type: "posts"
    values:
      comments: false                                   # Set to true to enable disqus comments


### Exclude from processing ###
exclude:
  - README.md
  - CONTRIBUTING.md
  - LICENSE
  - "*.log"
